name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  go-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Unit tests with race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build static binary
        run: CGO_ENABLED=0 go build -trimpath -o tenantprobe ./cmd/tenantprobe

  pgvector-jwt-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Credentialed pgvector boundary test
        run: ./scripts/verify_pgvector.sh
