services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tenantprobe
      POSTGRES_USER: tenantprobe
      POSTGRES_PASSWORD: tenantprobe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenantprobe -d tenantprobe"]
      interval: 2s
      timeout: 2s
      retries: 30

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://tenantprobe:tenantprobe@db:5432/tenantprobe
      DEMO_JWT_SECRET: tenantprobe-local-demo-secret-at-least-32-bytes
      TEST_ADMIN_TOKEN: tenantprobe-local-admin
      SAFE: ${SAFE:-0}
    ports:
      - "8078:8078"
    depends_on:
      db:
        condition: service_healthy
