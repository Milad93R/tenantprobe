name: "TenantProbe"
description: >-
  Cross-tenant isolation red-team scanner for multi-tenant RAG/agent APIs.
  Seeds synthetic tenants with unique canary secrets, attacks the target from
  one tenant trying to reach another's data, and fails the job on any
  cross-tenant leak.
author: "milad93r"
branding:
  icon: "shield"
  color: "red"

inputs:
  target:
    description: "Base URL of the multi-tenant target API to scan."
    required: true
  scenario:
    description: "Path to a YAML scenario file. Overrides tenant/attack generation and adapter selection."
    required: false
    default: ""
  adapter:
    description: "Target adapter: demo | generic."
    required: false
    default: "demo"
  tenants:
    description: "Number of synthetic tenants to seed (ignored when a scenario is given)."
    required: false
    default: "2"
  report-format:
    description: "Report format: console | json | junit."
    required: false
    default: "junit"
  report-path:
    description: "Path to write the report to (relative to the workspace)."
    required: false
    default: "tenantprobe-report.xml"
  fail-on-leak:
    description: "Fail the job when a cross-tenant leak is detected (true|false)."
    required: false
    default: "true"
  detectors:
    description: "Optional comma-separated detector names. Empty uses the core detector set."
    required: false
    default: ""
  content-influence:
    description: "Enable victim-content provenance detection (true|false)."
    required: false
    default: "false"
  binary:
    description: >-
      Path to a prebuilt tenantprobe binary. When set and the file exists, the
      Action skips the Go build and uses this binary instead of building from
      source.
    required: false
    default: ""
  artifact-name:
    description: >-
      Artifact name used for the report upload. Give parallel jobs distinct
      names because artifact names must be unique within a workflow run.
    required: false
    default: "tenantprobe-report"
  go-version:
    description: "Go version to set up when building from source."
    required: false
    default: "1.23"

outputs:
  report:
    description: "Path to the written report file."
    value: ${{ inputs.report-path }}
  leaked:
    description: "true when a cross-tenant leak was detected, false otherwise."
    value: ${{ steps.scan.outputs.leaked }}

runs:
  using: "composite"
  steps:
    - name: Set up Go
      if: inputs.binary == '' || hashFiles(inputs.binary) == ''
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}

    - name: Resolve tenantprobe binary
      id: bin
      shell: bash
      env:
        INPUT_BINARY: ${{ inputs.binary }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        if [ -n "$INPUT_BINARY" ] && [ -f "$INPUT_BINARY" ]; then
          echo "Using prebuilt binary: $INPUT_BINARY"
          echo "path=$INPUT_BINARY" >> "$GITHUB_OUTPUT"
        else
          echo "Building tenantprobe from source ($ACTION_PATH)"
          CGO_ENABLED=0 go build -C "$ACTION_PATH" -o "$ACTION_PATH/tp" ./cmd/tenantprobe
          echo "path=$ACTION_PATH/tp" >> "$GITHUB_OUTPUT"
        fi

    - name: Run TenantProbe
      id: scan
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_REPORT_FORMAT: ${{ inputs.report-format }}
        INPUT_REPORT_PATH: ${{ inputs.report-path }}
        INPUT_SCENARIO: ${{ inputs.scenario }}
        INPUT_ADAPTER: ${{ inputs.adapter }}
        INPUT_TENANTS: ${{ inputs.tenants }}
        INPUT_DETECTORS: ${{ inputs.detectors }}
        INPUT_CONTENT_INFLUENCE: ${{ inputs.content-influence }}
      run: |
        set -uo pipefail
        BIN="${{ steps.bin.outputs.path }}"
        ARGS=( -target "$INPUT_TARGET" -report "$INPUT_REPORT_FORMAT" -out "$INPUT_REPORT_PATH" )
        if [ -n "$INPUT_SCENARIO" ]; then
          ARGS+=( -scenario "$INPUT_SCENARIO" )
        else
          ARGS+=( -adapter "$INPUT_ADAPTER" -tenants "$INPUT_TENANTS" )
        fi
        if [ -n "$INPUT_DETECTORS" ]; then
          ARGS+=( -detectors "$INPUT_DETECTORS" )
        fi
        if [ "$INPUT_CONTENT_INFLUENCE" = "true" ]; then
          ARGS+=( -content-influence )
        fi
        echo "+ $BIN ${ARGS[*]}"
        # Composite-action bash steps run with `-e` injected by the runner.
        # Put the scanner in a conditional so exit 1 (a leak verdict) can be
        # captured, reported, and enforced by the final step instead of
        # aborting this output-producing step.
        if "$BIN" "${ARGS[@]}"; then
          CODE=0
        else
          CODE=$?
        fi
        echo "exit-code=$CODE" >> "$GITHUB_OUTPUT"
        if [ "$CODE" -eq 0 ]; then
          echo "leaked=false" >> "$GITHUB_OUTPUT"
        elif [ "$CODE" -eq 1 ]; then
          echo "leaked=true" >> "$GITHUB_OUTPUT"
        else
          echo "leaked=error" >> "$GITHUB_OUTPUT"
        fi
        # Verdict enforcement is a separate final step. Keeping this step green
        # ensures its outputs remain available even when the Action must fail.
        exit 0

    - name: Upload TenantProbe report
      if: always() && inputs.report-path != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.report-path }}
        if-no-files-found: ignore

    - name: Enforce TenantProbe verdict
      shell: bash
      env:
        EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
        FAIL_ON_LEAK: ${{ inputs.fail-on-leak }}
      run: |
        set -euo pipefail
        case "$EXIT_CODE" in
          0)
            exit 0
            ;;
          1)
            if [ "$FAIL_ON_LEAK" = "false" ]; then
              exit 0
            fi
            echo "::error::TenantProbe detected a cross-tenant leak."
            exit 1
            ;;
          *)
            echo "::error::TenantProbe exited with a tool or target error (code: ${EXIT_CODE:-missing})."
            exit 2
            ;;
        esac
